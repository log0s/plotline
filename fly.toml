app = "log0s-plotline-api"
   primary_region = "lax"

   [build]
     dockerfile = "Dockerfile.fly"

   [env]
     APP_ENV = "production"
     ENABLE_TITILER = "true"
     TITILER_URL = "http://plotline-titiler.internal:80"
     API_INTERNAL_URL = "http://log0s-plotline-api.internal:8000"

   [http_service]
     internal_port = 8000
     force_https = true
     auto_stop_machines = "off"
     auto_start_machines = true
     min_machines_running = 1

   [[vm]]
     memory = "512mb"
     cpu_kind = "shared"
     cpus = 1