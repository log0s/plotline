# fly.toml app configuration file generated for plotline-titiler on 2026-03-30T13:17:48-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'plotline-titiler'
primary_region = 'lax'

[build]
  image = 'ghcr.io/developmentseed/titiler:latest'

[env]
  MAX_WORKERS = '2'
  WORKERS_PER_CORE = '1'

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '1024mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
