services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-plotline}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-plotline}
      POSTGRES_DB: ${POSTGRES_DB:-plotline}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-plotline} -d ${POSTGRES_DB:-plotline}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-plotline}:${POSTGRES_PASSWORD:-plotline}@postgres:5432/${POSTGRES_DB:-plotline}
      REDIS_URL: redis://redis:6379/0
      TITILER_URL: http://titiler:80
      API_INTERNAL_URL: http://api:8000
    volumes:
      - ./backend:/app
      - ./scripts:/app/scripts
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      titiler:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-plotline}:${POSTGRES_PASSWORD:-plotline}@postgres:5432/${POSTGRES_DB:-plotline}
      REDIS_URL: redis://redis:6379/0
      TITILER_URL: http://titiler:80
      API_INTERNAL_URL: http://api:8000
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4 --pool=threads

  titiler:
    image: ghcr.io/developmentseed/titiler:1.2.1
    ports:
      - "8001:80"
    environment:
      - WORKERS_PER_CORE=1
      - MAX_WORKERS=2
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
    ports:
      - "5173:5173"
    depends_on:
      - api
    environment:
      VITE_API_BASE_URL: http://localhost:8000

volumes:
  postgres_data:
